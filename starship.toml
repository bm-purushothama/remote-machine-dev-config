# ╔══════════════════════════════════════════════════════════════╗
# ║  Starship Prompt — Catppuccin Mocha                         ║
# ║  ~/.config/starship.toml                                    ║
# ╚══════════════════════════════════════════════════════════════╝

# Performance
scan_timeout    = 30
command_timeout = 500
add_newline     = true

# Prompt format
format = """
[╭─](surface1) $username$hostname$directory$git_branch$git_status$git_state$fill$cmd_duration$jobs$time
[╰─](surface1)$character"""

# Right prompt (optional: language versions)
right_format = """$python$rust$golang$nodejs$c$lua$docker_context$kubernetes"""

# Catppuccin Mocha palette
palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

# ── Prompt character ─────────────────────────────────────────
[character]
success_symbol = "[❯](green)"
error_symbol   = "[❯](red)"
vimcmd_symbol  = "[❮](mauve)"

# ── Username (show on SSH or root) ───────────────────────────
[username]
style_user = "bold green"
style_root = "bold red"
format     = "[$user]($style)"
show_always = false            # Only show on SSH or when root

# ── Hostname (show on SSH) ───────────────────────────────────
[hostname]
ssh_only   = true
format     = "[@$hostname](bold sky) "
trim_at    = "."

# ── Directory ────────────────────────────────────────────────
[directory]
style             = "bold blue"
format            = " [$path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncate_to_repo  = true
truncation_symbol = "…/"
read_only         = " 󰌾"
read_only_style   = "red"

[directory.substitutions]
"~/projects" = "  "
"~/work"     = " 󰒋 "
"~/src"      = "  "
"~"          = " "

# ── Git Branch ───────────────────────────────────────────────
[git_branch]
symbol = " "
style  = "bold mauve"
format = "[$symbol$branch(:$remote_branch)]($style) "
truncation_length = 30

# ── Git Status ───────────────────────────────────────────────
[git_status]
format     = '([$all_status$ahead_behind]($style) )'
style      = "bold peach"
ahead      = "⇡$count "
behind     = "⇣$count "
diverged   = "⇕⇡$ahead_count⇣$behind_count "
conflicted = "=$count "
untracked  = "?$count "
stashed    = "\\$$count "
modified   = "!$count "
staged     = "+$count "
renamed    = "»$count "
deleted    = "✘$count "

# ── Git State (rebase, merge, etc.) ──────────────────────────
[git_state]
format     = '[\($state( $progress_current/$progress_total)\)]($style) '
style      = "bold yellow"
rebase     = "REBASING"
merge      = "MERGING"
revert     = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect     = "BISECTING"

# ── Fill (pushes right side) ─────────────────────────────────
[fill]
symbol = " "

# ── Command Duration ─────────────────────────────────────────
[cmd_duration]
min_time          = 2000       # Show only if >2s
format            = " [󱎫 $duration]($style)"
style             = "bold yellow"
show_milliseconds = false

# ── Background Jobs ──────────────────────────────────────────
[jobs]
symbol    = " "
style     = "bold blue"
threshold = 1
format    = " [$symbol$number]($style)"

# ── Time ─────────────────────────────────────────────────────
[time]
disabled        = false
format          = " [$time]($style)"
style           = "overlay1"
time_format     = "%H:%M"
utc_time_offset = "local"

# ═════════════════════════════════════════════════════════════
#  LANGUAGE DETECTORS (right prompt)
# ═════════════════════════════════════════════════════════════

[python]
symbol  = " "
style   = "bold yellow"
format  = '[$symbol($version )(\($virtualenv\) )]($style)'
detect_extensions = ["py"]
detect_files      = ["requirements.txt", "pyproject.toml", "setup.py", "Pipfile"]

[rust]
symbol  = " "
style   = "bold peach"
format  = "[$symbol($version )]($style)"

[golang]
symbol  = " "
style   = "bold sky"
format  = "[$symbol($version )]($style)"

[nodejs]
symbol  = " "
style   = "bold green"
format  = "[$symbol($version )]($style)"
detect_files = ["package.json", ".node-version"]

[c]
symbol  = " "
style   = "bold blue"
format  = "[$symbol($version(-$name) )]($style)"
detect_extensions = ["c", "h", "cpp", "hpp", "cc", "hh"]

[lua]
symbol  = " "
style   = "bold sapphire"
format  = "[$symbol($version )]($style)"

[docker_context]
symbol  = " "
style   = "bold sky"
format  = "[$symbol$context]($style) "
only_with_files = true

[kubernetes]
disabled = false
symbol   = "󱃾 "
style    = "bold lavender"
format   = "[$symbol$context( \\($namespace\\))]($style) "

# ═════════════════════════════════════════════════════════════
#  DISABLED (too noisy for remote dev servers)
# ═════════════════════════════════════════════════════════════

[package]
disabled = true

[gcloud]
disabled = true

[aws]
disabled = true

[azure]
disabled = true

[terraform]
disabled = true   # Enable if doing IaC work

[java]
disabled = true   # Enable if needed

[php]
disabled = true
