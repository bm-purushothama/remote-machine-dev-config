# ╔══════════════════════════════════════════════════════════════╗
# ║              TMUX CONFIG — Developer Edition                ║
# ║        Optimized for tmux 3.4+ │ Catppuccin Mocha          ║
# ╚══════════════════════════════════════════════════════════════╝

# ─── TERMINAL & COLOR ────────────────────────────────────────
set -g  default-terminal   "tmux-256color"
set -as terminal-features  ",xterm-256color:RGB"
set -as terminal-overrides  ",*:Tc"              # True color
set -as terminal-overrides  ",*:Smulx=\E[4::%p1%dm"   # Undercurl
set -as terminal-overrides  ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

# ─── GENERAL ─────────────────────────────────────────────────
set  -g  prefix            C-a
unbind C-b
bind   C-a  send-prefix

set  -sg escape-time       0                     # No ESC delay (critical for Neovim)
set  -g  repeat-time       600
set  -g  focus-events      on                    # For Neovim autoread
set  -g  history-limit     100000
set  -g  mouse             on
set  -g  set-clipboard     on                    # OSC 52 clipboard
set  -g  display-time      1500

# ─── INDEXING ────────────────────────────────────────────────
set  -g  base-index        1
setw -g  pane-base-index   1
set  -g  renumber-windows  on

# ─── SPLITS (preserving cwd) ────────────────────────────────
bind  |  split-window -h  -c "#{pane_current_path}"
bind  -  split-window -v  -c "#{pane_current_path}"
bind  c  new-window       -c "#{pane_current_path}"
unbind '"'
unbind %

# ═════════════════════════════════════════════════════════════
#  SMART-SPLITS.NVIM — Seamless Neovim ↔ Tmux Navigation
#  Ctrl+h/j/k/l  = navigate panes (works across nvim & tmux)
#  Alt+h/j/k/l   = resize panes  (works across nvim & tmux)
#
#  Uses @pane-is-vim variable set by smart-splits.nvim plugin.
#  Falls back to is_vim detection for non-smart-splits setups.
# ═════════════════════════════════════════════════════════════

# Navigation: Ctrl+hjkl
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h'  'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j'  'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k'  'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l'  'select-pane -R'

# Resizing: Alt+hjkl
bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h'  'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j'  'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k'  'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l'  'resize-pane -R 3'

# Previous pane: Ctrl+\
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\' 'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\\\' 'select-pane -l'"

# Also bind in copy-mode-vi so nav works while scrolling
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ─── Window navigation ──────────────────────────────────────
bind -n  S-Left   previous-window
bind -n  S-Right  next-window

# Alt+number to jump to window (browser-style)
bind -n  M-1  select-window -t 1
bind -n  M-2  select-window -t 2
bind -n  M-3  select-window -t 3
bind -n  M-4  select-window -t 4
bind -n  M-5  select-window -t 5
bind -n  M-6  select-window -t 6
bind -n  M-7  select-window -t 7
bind -n  M-8  select-window -t 8
bind -n  M-9  select-window -t :$

# Swap windows
bind -r  <  swap-window -d -t -1
bind -r  >  swap-window -d -t +1

# Toggle zoom
bind  m  resize-pane -Z

# Kill without confirm
bind  x  kill-pane
bind  X  kill-window

# Restore Ctrl-L to clear screen (since C-l is taken by nav)
bind  C-l  send-keys 'C-l'

# ─── COPY MODE (vi) ─────────────────────────────────────────
setw -g  mode-keys         vi
bind     Enter  copy-mode
bind -T  copy-mode-vi  v      send -X begin-selection
bind -T  copy-mode-vi  C-v    send -X rectangle-toggle
bind -T  copy-mode-vi  y      send -X copy-selection-and-cancel
bind -T  copy-mode-vi  H      send -X start-of-line
bind -T  copy-mode-vi  L      send -X end-of-line

# ─── RELOAD ──────────────────────────────────────────────────
bind  r  source-file ~/.tmux.conf \; display " Config reloaded!"

# ─── MISC ────────────────────────────────────────────────────
setw -g  aggressive-resize on
set  -g  set-titles        on
set  -g  set-titles-string "#S ❐ #W"
setw -g  monitor-activity  on
set  -g  visual-activity   off
set  -g  status-interval   5

# ─── CATPPUCCIN MOCHA THEME ─────────────────────────────────

# Status bar
set  -g  status-position      top
set  -g  status-style         "bg=#181825,fg=#cdd6f4"
set  -g  status-left-length   40
set  -g  status-right-length  80

set  -g  status-left "\
#[bg=#89b4fa,fg=#11111b,bold]  #S \
#[bg=#181825,fg=#89b4fa]"

set  -g  status-right "\
#[fg=#585b70]│ \
#[fg=#a6adc8]#H \
#[fg=#585b70]│ \
#[fg=#fab387]%d %b \
#[fg=#585b70]│ \
#[fg=#a6e3a1,bold]%H:%M \
#[default]"

# Window tabs
set  -g  status-justify       left
setw -g  window-status-format "\
#[fg=#6c7086] #I:#W "
setw -g  window-status-current-format "\
#[bg=#313244,fg=#89b4fa,bold] #I:#W \
#[default]"
setw -g  window-status-separator ""
setw -g  window-status-activity-style "fg=#fab387,bold"

# Pane borders
set  -g  pane-border-style        "fg=#45475a"
set  -g  pane-active-border-style "fg=#89b4fa"

# Messages
set  -g  message-style            "bg=#313244,fg=#cdd6f4"
set  -g  message-command-style    "bg=#313244,fg=#cdd6f4"
setw -g  mode-style               "bg=#585b70,fg=#cdd6f4"
setw -g  clock-mode-colour        "#89b4fa"

# ─── PLUGINS (via TPM) ──────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim        'session'
set -g @continuum-restore              'on'
set -g @continuum-save-interval        '15'
set -g @yank_action                    'copy-pipe-and-cancel'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
